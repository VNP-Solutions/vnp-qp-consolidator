<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — VNP QP Consolidator</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
    <div class="login-container">
        <!-- Left Panel: Branding & Illustration -->
        <aside class="left-panel">
            <div class="brand">
                <img src="/assets/logo.svg" alt="Logo" class="brand-logo">
            </div>

            <div class="illustration">
                <!-- Current Balance Card -->
                <div class="card balance-card">
                    <div class="card-icon balance-icon">
                        <svg width="22" height="16" viewBox="0 0 22 16" fill="none">
                            <rect x="1" y="1" width="20" height="14" rx="2" fill="#2F6BFF"/>
                            <rect x="1" y="4" width="20" height="3" fill="#1B4FCC"/>
                        </svg>
                    </div>
                    <p class="card-label">Charged this month</p>
                    <p class="card-amount"><span class="currency">$</span><span class="amount">24,359</span></p>
                </div>

                <!-- Donut Chart Card -->
                <div class="card chart-card">
                    <svg class="donut" viewBox="0 0 120 120" width="170" height="170">
                        <!-- Segments (stroke-dasharray on a circle, circumference ≈ 314.16) -->
                        <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="18"/>
                        <!-- Blue 34% -->
                        <circle cx="60" cy="60" r="50" fill="none" stroke="#2F6BFF" stroke-width="18"
                                stroke-dasharray="106.8 314.16" stroke-dashoffset="0" transform="rotate(-90 60 60)"/>
                        <!-- Green 26% -->
                        <circle cx="60" cy="60" r="50" fill="none" stroke="#2EC27E" stroke-width="18"
                                stroke-dasharray="81.7 314.16" stroke-dashoffset="-106.8" transform="rotate(-90 60 60)"/>
                        <!-- Orange 22% -->
                        <circle cx="60" cy="60" r="50" fill="none" stroke="#F5A623" stroke-width="18"
                                stroke-dasharray="69.1 314.16" stroke-dashoffset="-188.5" transform="rotate(-90 60 60)"/>
                        <!-- Red 18% -->
                        <circle cx="60" cy="60" r="50" fill="none" stroke="#EF5350" stroke-width="18"
                                stroke-dasharray="56.5 314.16" stroke-dashoffset="-257.6" transform="rotate(-90 60 60)"/>
                    </svg>
                    <div class="donut-center">
                        <p class="donut-percent">34<span>%</span></p>
                        <p class="donut-label">Declined</p>
                    </div>
                    <div class="cursor">
                        <svg width="16" height="18" viewBox="0 0 16 18" fill="none">
                            <path d="M1 1 L1 14 L5 11 L8 17 L10 16 L7 10 L13 10 Z" fill="#1A1A1A" stroke="#fff" stroke-width="1"/>
                        </svg>
                    </div>
                </div>

                <!-- New Transaction Card -->
                <div class="card transaction-card">
                    <button class="add-btn" aria-label="Add transaction">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 4V16M4 10H16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <p class="transaction-title">New QP report</p>
                    <p class="transaction-subtitle">upload <span>.xls</span> file</p>
                </div>
            </div>

            <div class="welcome-block">
                <h2 class="welcome-title">Welcome back!</h2>
                <p class="welcome-text">To the VNP QP consolidation utility</p>
                <p class="welcome-text">Start managing your QP Reports faster and better</p>
            </div>

            
        </aside>

        <!-- Right Panel: Login Form -->
        <main class="right-panel">
            <div class="form-wrapper">
                <header class="form-header">
                    <h1 class="form-title">Welcome back!</h1>
                    <p class="form-subtitle">Start managing your finance faster and better</p>
                </header>

                <form class="login-form" id="login-form" novalidate>
                    <div class="input-group">
                        <span class="input-icon">
                            <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
                                <rect x="1" y="1" width="16" height="12" rx="2" stroke="#9AA0AB" stroke-width="1.5"/>
                                <path d="M2 3L9 8L16 3" stroke="#9AA0AB" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                        </span>
                        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
                    </div>

                    <div class="input-group">
                        <span class="input-icon">
                            <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
                                <rect x="1" y="7" width="12" height="8" rx="2" stroke="#9AA0AB" stroke-width="1.5"/>
                                <path d="M3.5 7V4.5C3.5 2.567 5.067 1 7 1C8.933 1 10.5 2.567 10.5 4.5V7" stroke="#9AA0AB" stroke-width="1.5"/>
                            </svg>
                        </span>
                        <input type="password" id="password" placeholder="At least 8 characters" autocomplete="current-password" required>
                        <button type="button" class="eye-btn" id="eye-btn" aria-label="Toggle password visibility">
                            <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
                                <path d="M1 7C1 7 4 1.5 9 1.5C14 1.5 17 7 17 7C17 7 14 12.5 9 12.5C4 12.5 1 7 1 7Z" stroke="#9AA0AB" stroke-width="1.5"/>
                                <circle cx="9" cy="7" r="2.5" stroke="#9AA0AB" stroke-width="1.5"/>
                            </svg>
                        </button>
                    </div>

                    <div class="form-row">
                        <label class="remember-me">
                            <input type="checkbox" id="remember">
                            <span class="checkbox-custom"></span>
                            <span class="remember-label">Remember me</span>
                        </label>
                        <a href="/forgot-password" class="forgot-link">Forgot password?</a>
                    </div>

                    <p class="form-error" id="form-error" role="alert" hidden></p>

                    <button type="submit" class="login-btn" id="submit-btn">
                        <span class="btn-spinner" aria-hidden="true"></span>
                        <span class="btn-label">Login</span>
                    </button>

                    <!-- <div class="divider"><span>or</span></div> -->

                    <!-- <p class="signup-text">Don't you have an account? <a href="#" class="signup-link">Sign Up</a></p> -->
                </form>
            </div>

            <footer class="form-footer">© 2026 VNPS HOLDINGS ALL RIGHTS RESERVED</footer>
        </main>
    </div>
    <script src="login.js"></script>
</body>
</html>
